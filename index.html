<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daria Epure – UX Designer</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f0e8;
      --text: #111;
      --subtitle: #555;
      --blob-opacity: 0.35;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --text: #f0ece4;
        --subtitle: #999;
        --blob-opacity: 0.2;
      }
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 0.5rem;
      overflow: hidden;
      position: relative;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: var(--blob-opacity);
      z-index: 0;
    }

    .blob-1 {
      width: 480px;
      height: 480px;
      background: #0891b2;
      top: -100px;
      left: -100px;
      animation: morph1 14s ease-in-out infinite, drift1 20s ease-in-out infinite;
    }

    .blob-2 {
      width: 380px;
      height: 380px;
      background: #f0a070;
      bottom: -80px;
      right: -80px;
      animation: morph2 18s ease-in-out infinite, drift2 24s ease-in-out infinite;
    }

    .blob-3 {
      width: 280px;
      height: 280px;
      background: #a3d9a5;
      bottom: 20%;
      left: 10%;
      animation: morph1 16s ease-in-out infinite reverse, drift3 28s ease-in-out infinite;
    }

    @keyframes morph1 {
      0%   { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
      20%  { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
      40%  { border-radius: 50% 50% 30% 70% / 50% 70% 30% 50%; }
      60%  { border-radius: 70% 30% 50% 50% / 40% 60% 40% 60%; }
      80%  { border-radius: 40% 60% 60% 40% / 70% 40% 60% 30%; }
      100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    }

    @keyframes morph2 {
      0%   { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
      25%  { border-radius: 70% 30% 40% 60% / 60% 40% 60% 40%; }
      50%  { border-radius: 50% 50% 60% 40% / 30% 60% 40% 70%; }
      75%  { border-radius: 30% 70% 30% 70% / 50% 30% 70% 50%; }
      100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
    }

    @keyframes drift1 {
      0%   { transform: translate(0px,   0px); }
      20%  { transform: translate(60px,  40px); }
      40%  { transform: translate(30px,  80px); }
      60%  { transform: translate(80px,  50px); }
      80%  { transform: translate(40px, -20px); }
      100% { transform: translate(0px,   0px); }
    }

    @keyframes drift2 {
      0%   { transform: translate(0px,    0px); }
      25%  { transform: translate(-60px, -50px); }
      50%  { transform: translate(-20px, -90px); }
      75%  { transform: translate(-80px, -30px); }
      100% { transform: translate(0px,    0px); }
    }

    @keyframes drift3 {
      0%   { transform: translate(0px,   0px); }
      20%  { transform: translate(50px, -60px); }
      40%  { transform: translate(-30px,-80px); }
      60%  { transform: translate(-60px,-20px); }
      80%  { transform: translate(20px,  40px); }
      100% { transform: translate(0px,   0px); }
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1.5rem;
      text-align: center;
    }

    h1 { font-size: 3rem; font-weight: 800; letter-spacing: -0.03em; }
    h1 span { color: #0891b2; }
    .bunny {
      color: initial;
      display: inline-block;
      animation: bounce 2.4s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .ripple {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%, -50%) scale(0);
      animation: ripple-out 1s ease-out forwards;
    }
    @keyframes ripple-out {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(6); opacity: 0; }
    }
    p { font-size: 1.2rem; font-weight: 400; letter-spacing: -0.01em; color: var(--subtitle); }

    .name { display: inline-block; font-family: 'Playfair Display', Georgia, serif; font-weight: 700; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="content">
    <h1>Hi, I'm <span class="name">Daria Epure</span><span class="bunny">🐰</span></h1>
    <p>UX product designer making security feel human @ Bitdefender</p>
  </div>
  <script>
    // — Ripple on click —
    document.addEventListener('click', e => {
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      const size = 120;
      ripple.style.width  = size + 'px';
      ripple.style.height = size + 'px';
      ripple.style.left   = e.clientX + 'px';
      ripple.style.top    = e.clientY + 'px';
      ripple.style.background = 'radial-gradient(circle, #0891b2, #a3d9a5)';
      ripple.style.filter = 'blur(20px)';
      document.body.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    });

  </script>
</body>
</html>
