<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daria Epure – UX Designer</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f0e8;
      --text: #111;
      --subtitle: #555;
      --blob-opacity: 0.35;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --text: #f0ece4;
        --subtitle: #999;
        --blob-opacity: 0.2;
      }
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 0.5rem;
      overflow: hidden;
      position: relative;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: var(--blob-opacity);
      z-index: 0;
    }

    .blob-1 {
      width: 480px;
      height: 480px;
      background: #0891b2;
      top: -100px;
      left: -100px;
      animation: morph1 10s ease-in-out infinite, drift1 14s ease-in-out infinite;
    }

    .blob-2 {
      width: 380px;
      height: 380px;
      background: #f0a070;
      bottom: -80px;
      right: -80px;
      animation: morph2 12s ease-in-out infinite, drift2 16s ease-in-out infinite;
    }

    .blob-3 {
      width: 280px;
      height: 280px;
      background: #a3d9a5;
      bottom: 20%;
      left: 10%;
      animation: morph1 9s ease-in-out infinite reverse, drift3 18s ease-in-out infinite;
    }

    @keyframes morph1 {
      0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
      25%       { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
      50%       { border-radius: 50% 50% 30% 70% / 50% 70% 30% 50%; }
      75%       { border-radius: 70% 30% 50% 50% / 40% 60% 40% 60%; }
    }

    @keyframes morph2 {
      0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
      33%       { border-radius: 70% 30% 40% 60% / 60% 40% 60% 40%; }
      66%       { border-radius: 50% 50% 60% 40% / 30% 60% 40% 70%; }
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(40px, 30px); }
    }

    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(-30px, -40px); }
    }

    @keyframes drift3 {
      0%, 100% { transform: translate(0, 0); }
      33%       { transform: translate(20px, -30px); }
      66%       { transform: translate(-20px, 20px); }
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    h1 { font-size: 3rem; font-weight: 800; letter-spacing: -0.03em; }
    h1 span { color: #0891b2; }
    .bunny { color: initial; display: inline-block; animation: bounce 2.4s ease-in-out infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    p { font-size: 1.2rem; font-weight: 400; letter-spacing: -0.01em; color: var(--subtitle); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="content">
    <h1>Hi, I'm <span>Daria Epure</span><span class="bunny">🐰</span></h1>
    <p>UX product designer making security feel human @ Bitdefender</p>
  </div>
</body>
</html>
